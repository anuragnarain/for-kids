<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Count & Tap 🔢</title>
<style>
  :root{
    --bg1:#e0f7fa; --bg2:#fff3e0; --bg3:#f3e5f5;
    --card:#ffffff; --ink:#33324a; --good:#2fbf87; --sel:#ffd23f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  body{
    font-family:"Comic Sans MS","Baloo 2",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    overflow:hidden; user-select:none; touch-action:manipulation;
    display:flex; flex-direction:column; align-items:center;
    height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button{ touch-action:manipulation; font-family:inherit; }

  /* ---- Top bar ---- */
  #topbar{ width:100%; max-width:640px; padding:12px 20px;
    display:flex; justify-content:space-between; align-items:center; gap:12px; }
  #stars{ background:rgba(255,255,255,.85); border-radius:999px; padding:8px 18px;
    font-size:clamp(20px,5vw,30px); font-weight:800; display:flex; align-items:center; gap:6px;
    box-shadow:0 4px 0 rgba(0,0,0,.12); }
  #stars.pop{ animation:pop .5s ease; }
  #speaker{ background:rgba(255,255,255,.85); border:none; border-radius:999px;
    width:clamp(50px,12vw,60px); height:clamp(50px,12vw,60px); font-size:clamp(22px,6vw,30px);
    cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  #speaker:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }
  .tb-left{ display:flex; align-items:center; gap:10px; }
  .homeBtn{ background:rgba(255,255,255,.85); border-radius:999px;
    width:clamp(46px,11vw,58px); height:clamp(46px,11vw,58px);
    display:flex; align-items:center; justify-content:center; font-size:clamp(22px,5.5vw,28px);
    text-decoration:none; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .homeBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }

  /* ---- Hint ---- */
  #hint{ color:#3a3a5a; font-weight:800; text-align:center; padding:0 16px 6px;
    font-size:clamp(16px,4.5vw,24px); text-shadow:0 1px 0 rgba(255,255,255,.4); }

  /* ---- Object area ---- */
  #stage{ flex:1; width:100%; max-width:500px; display:flex; flex-direction:column;
    justify-content:center; align-items:center; padding:0 16px; min-height:0; gap:clamp(10px,2.5vh,20px); }

  #objects{
    display:flex; flex-wrap:wrap; justify-content:center; align-items:center; align-content:center;
    gap:clamp(8px,2.5vw,18px);
    flex:1; min-height:0; width:100%;
  }
  .obj{
    font-size:clamp(46px,14vw,80px); line-height:1; cursor:pointer;
    transition:transform .15s ease, filter .15s ease;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.15));
  }
  .obj.sz-m{ font-size:clamp(36px,10vw,60px); }
  .obj.sz-s{ font-size:clamp(30px,8vw,48px); }
  .obj.sz-xs{ font-size:clamp(26px,6.5vw,40px); }
  .obj.tapped{
    transform:scale(1.3) translateY(-6px);
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.25));
  }
  .obj.counted{
    animation:countBounce .35s ease;
  }
  @keyframes countBounce{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.35) translateY(-8px); }
    100%{ transform:scale(1); }
  }
  .obj.flyOut{
    animation:flyOut .45s ease forwards;
  }
  @keyframes flyOut{
    0%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(0) rotate(180deg); opacity:0; }
  }

  /* ---- Count badge ---- */
  #countBadge{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(60px,18vw,110px); font-weight:900; color:#fff; z-index:60;
    text-shadow:0 5px 0 rgba(0,0,0,.2); pointer-events:none;
  }
  #countBadge.show{ animation:pop .5s ease forwards; }

  /* ---- Answer buttons ---- */
  #answers{
    display:flex; gap:clamp(10px,3vw,20px); padding:0 8px clamp(14px,3vh,24px);
    width:100%; max-width:500px; justify-content:center;
  }
  .ans{
    flex:1; max-width:100px; aspect-ratio:1/1;
    border:none; border-radius:22px; background:var(--card);
    font-size:clamp(28px,8vw,48px); font-weight:900; color:var(--ink);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 0 rgba(0,0,0,.16); transition:transform .1s, box-shadow .1s, background .2s;
  }
  .ans:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .ans.correct{ background:#c9f7e5; color:var(--good); box-shadow:0 0 0 4px var(--good), 0 6px 0 rgba(0,0,0,.1);
    animation:matchPop .45s ease; }
  .ans.wrong{ background:#ffe0e0; animation:nope .4s ease; }

  @keyframes nope{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  @keyframes matchPop{ 0%{transform:scale(1)} 45%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(0)} 60%{transform:translate(-50%,-50%) scale(1.15)} 100%{transform:translate(-50%,-50%) scale(1)} }

  /* ---- Confetti + toast ---- */
  .confetti{ position:fixed; top:-20px; width:14px; height:14px; z-index:50; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105dvh) rotate(720deg); } }
  #toast{ position:fixed; top:38%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(32px,9vw,58px); font-weight:900; color:#fff; z-index:60;
    text-shadow:0 4px 0 rgba(0,0,0,.2); pointer-events:none; text-align:center; }
  #toast.show{ animation:pop .8s ease; }

  /* ---- Start screen ---- */
  #start{ position:fixed; inset:0; z-index:100;
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; text-align:center; padding:20px; }
  #start .big{ font-size:clamp(70px,22vw,130px); animation:bob 2.2s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  #start h1{ font-size:clamp(30px,8vw,52px); color:#3a3a5a; text-shadow:0 3px 0 rgba(255,255,255,.4); }
  #start p{ color:#4a4a68; font-size:clamp(15px,4vw,20px); opacity:.95; max-width:24ch; }
  #play{ background:var(--good); color:#fff; border:none; border-radius:999px;
    font-size:clamp(26px,7vw,38px); font-weight:800; padding:16px 50px; cursor:pointer; box-shadow:0 8px 0 rgba(0,0,0,.2); }
  #play:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.2); }

  /* ---- Landscape ---- */
  @media (orientation:landscape) and (max-height:500px){
    #topbar{ padding:4px 14px; }
    #hint{ font-size:clamp(13px,3.4vw,18px); padding:0 12px 2px; }
    #stars{ padding:4px 12px; font-size:clamp(15px,3.5vw,22px); }
    #speaker{ width:38px; height:38px; font-size:18px; }
    .homeBtn{ width:38px; height:38px; font-size:18px; }
    #stage{ flex-direction:row; padding:0 12px; max-width:100%; }
    #objects{ flex:1; }
    .obj{ font-size:clamp(32px,10vh,60px); }
    .obj.sz-m{ font-size:clamp(26px,8vh,46px); }
    .obj.sz-s{ font-size:clamp(22px,6vh,38px); }
    .obj.sz-xs{ font-size:clamp(18px,5vh,32px); }
    #answers{ flex-direction:column; width:auto; padding:0 8px; gap:clamp(6px,1.5vh,12px); }
    .ans{ max-width:none; width:clamp(44px,12vh,70px); aspect-ratio:1/1; font-size:clamp(22px,7vh,38px); }
  }
</style>
</head>
<body>
  <div id="topbar">
    <div class="tb-left">
      <a class="homeBtn" href="index.html" title="Home" aria-label="Home">🏠</a>
      <div id="stars">⭐ <span id="starCount">0</span></div>
    </div>
    <button id="speaker" title="Say it again">🔊</button>
  </div>
  <div id="hint">Count the objects, then pick the number!</div>

  <div id="stage">
    <div id="objects"></div>
  </div>
  <div id="answers"></div>

  <div id="countBadge"></div>
  <div id="toast"></div>

  <div id="start">
    <div class="big">🔢</div>
    <h1>Count &amp; Tap!</h1>
    <p>Count the objects and tap the right number.</p>
    <button id="play">▶ Play</button>
  </div>

<script>
(function(){
  const EMOJI_SETS = [
    ["🍎","🍊","🍋","🍇","🍓","🍌","🍉","🍒","🫐","🥝"],
    ["🐶","🐱","🐰","🐸","🐥","🐝","🐞","🦋","🐢","🐠"],
    ["⭐","🌙","☀️","🌈","❄️","🔥","💧","🌸","🍀","🌺"],
    ["🚗","🚌","🚲","✈️","🚀","⛵","🚂","🏍️","🛴","🚁"],
    ["⚽","🏀","🎾","🏈","🎯","🎲","🪁","🧸","🎈","🎵"]
  ];

  const $ = id => document.getElementById(id);
  const objArea = $("objects"), ansArea = $("answers"), starCountEl = $("starCount");
  const toast = $("toast"), countBadge = $("countBadge");

  let stars = 0, locked = false, lastSpeech = "", tapCount = 0, correctAnswer = 0;

  const rnd = n => Math.floor(Math.random()*n);
  const pick = arr => arr[rnd(arr.length)];
  const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; };

  // ---------- Audio ----------
  let actx = null, masterGain = null;
  function ensureAudio(){
    if(!actx){
      try{
        actx = new (window.AudioContext||window.webkitAudioContext)();
        masterGain = actx.createGain(); masterGain.gain.value = 0.85;
        const comp = actx.createDynamicsCompressor();
        masterGain.connect(comp); comp.connect(actx.destination);
      }catch(e){}
    }
    if(actx && actx.state === "suspended") actx.resume();
  }
  function tone(freq, start, dur, type, peak){
    if(!actx) return;
    const t0 = actx.currentTime + start;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine"; o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak || 0.22, t0 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t0); o.stop(t0 + dur + 0.03);
  }
  const playCorrect = () => { ensureAudio(); [523.25,659.25,783.99].forEach((f,i)=>tone(f, i*0.11, 0.34, "sine", 0.3)); };
  const playWrong   = () => { ensureAudio(); tone(392,0,0.18,"sine",0.2); tone(311,0.13,0.26,"sine",0.2); };
  const playWin     = () => { ensureAudio(); [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f, i*0.12, 0.4, "sine", 0.28)); };
  const playPop     = () => { ensureAudio(); tone(880, 0, 0.06, "sine", 0.1); };

  // ---------- Speech ----------
  let voice = null;
  function chooseVoice(){
    if(!("speechSynthesis" in window)) return;
    const vs = speechSynthesis.getVoices(); if(!vs.length) return;
    const prefer = ["Google US English","Samantha",
      "Microsoft Aria Online (Natural) - English (United States)","Microsoft Aria",
      "Microsoft Jenny Online (Natural) - English (United States)","Microsoft Zira","Karen","Moira","Alex"];
    voice = prefer.map(n => vs.find(v => v.name === n)).find(Boolean)
         || vs.find(v => /en[-_]US/i.test(v.lang) && /google|aria|jenny|zira|samantha|female/i.test(v.name))
         || vs.find(v => /en[-_]US/i.test(v.lang)) || vs.find(v => /^en/i.test(v.lang)) || vs[0];
  }
  if("speechSynthesis" in window){ chooseVoice(); speechSynthesis.onvoiceschanged = chooseVoice; }
  let speakToken = 0;
  function speak(text){
    lastSpeech = text;
    if(!("speechSynthesis" in window)) return;
    const my = ++speakToken;
    try{ speechSynthesis.cancel(); }catch(e){}
    setTimeout(() => {
      if(my !== speakToken) return;
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if(voice) u.voice = voice;
        u.rate = 0.92; u.pitch = 1.05; u.volume = 1; u.lang = (voice && voice.lang) || "en-US";
        speechSynthesis.speak(u);
      }catch(e){}
    }, 45);
  }
  $("speaker").addEventListener("click", () => { ensureAudio(); if(lastSpeech) speak(lastSpeech); });

  // ---------- Number words ----------
  const WORDS = ["zero","one","two","three","four","five","six","seven","eight","nine","ten",
    "eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen",
    "twenty","twenty one","twenty two","twenty three","twenty four","twenty five"];

  // ---------- Build a round ----------
  function newRound(){
    locked = false; tapCount = 0;
    objArea.innerHTML = ""; ansArea.innerHTML = "";

    const count = 1 + rnd(25);
    correctAnswer = count;
    const emojiSet = pick(EMOJI_SETS);
    const emoji = pick(emojiSet);

    const sizeClass = count > 18 ? "sz-xs" : count > 12 ? "sz-s" : count > 7 ? "sz-m" : "";

    for(let i = 0; i < count; i++){
      const span = document.createElement("span");
      span.className = "obj" + (sizeClass ? " " + sizeClass : "");
      span.textContent = emoji;
      span.addEventListener("click", () => tapObject(span));
      objArea.appendChild(span);
    }

    const choices = new Set([count]);
    while(choices.size < 4){
      let c = count + (rnd(2) ? 1 : -1) * (1 + rnd(3));
      if(c < 1) c = count + 1 + rnd(3);
      if(c > 25) c = count - 1 - rnd(Math.min(2, count - 1));
      if(c >= 1 && c <= 25) choices.add(c);
    }
    const sorted = shuffle([...choices]);

    sorted.forEach(n => {
      const b = document.createElement("button");
      b.className = "ans";
      b.textContent = n;
      b.addEventListener("click", () => tapAnswer(b, n));
      ansArea.appendChild(b);
    });

    speak("How many " + emoji + " do you see?");
  }

  // ---------- Tap objects (counting interaction) ----------
  function tapObject(el){
    ensureAudio();
    playPop();
    tapCount++;

    el.classList.remove("counted");
    void el.offsetWidth;
    el.classList.add("counted");

    speak(WORDS[tapCount] || String(tapCount));
  }

  // ---------- Tap answer ----------
  function tapAnswer(btn, n){
    if(locked) return;
    ensureAudio();

    if(n === correctAnswer){
      locked = true;
      btn.classList.add("correct");
      playCorrect();
      addStar(); burst(15);
      speak("Yes! " + WORDS[correctAnswer] + "!");

      const objs = objArea.querySelectorAll(".obj");
      objs.forEach((o, i) => {
        setTimeout(() => o.classList.add("flyOut"), i * 80);
      });

      setTimeout(newRound, 1400);
    } else {
      playWrong();
      btn.classList.add("wrong");
      speak("Try again! Count carefully.");
      setTimeout(() => btn.classList.remove("wrong"), 450);
    }
  }

  // ---------- Rewards ----------
  function addStar(){
    stars++; starCountEl.textContent = stars;
    const s = $("stars"); s.classList.remove("pop"); void s.offsetWidth; s.classList.add("pop");
  }
  function showToast(txt){
    toast.textContent = txt;
    toast.classList.remove("show"); void toast.offsetWidth; toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => { toast.textContent = ""; }, 1900);
  }
  const CONF = ["#ff6b6b","#ffd93d","#4dabf7","#51cf66","#ff8fab","#9775fa"];
  function burst(n){
    for(let i=0;i<n;i++){
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = rnd(100)+"vw";
      c.style.background = pick(CONF);
      c.style.borderRadius = rnd(2) ? "50%" : "2px";
      c.style.animationDuration = (1.1 + Math.random()*1.1)+"s";
      c.style.animationDelay = (Math.random()*0.25)+"s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }

  // ---------- Start ----------
  $("play").addEventListener("click", () => {
    ensureAudio();
    $("start").style.display = "none";
    newRound();
  });
})();
</script>
</body>
</html>
