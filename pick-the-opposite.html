<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pick the Opposite 🔄</title>
<style>
  :root{
    --bg1:#fce4ec; --bg2:#e8eaf6; --bg3:#e0f2f1;
    --card:#ffffff; --ink:#33324a; --good:#2fbf87; --sel:#ffd23f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  body{
    font-family:"Comic Sans MS","Baloo 2",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    overflow:hidden; user-select:none; touch-action:manipulation;
    display:flex; flex-direction:column; align-items:center;
    height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button{ touch-action:manipulation; font-family:inherit; }

  /* ---- Top bar ---- */
  #topbar{ width:100%; max-width:640px; padding:12px 20px;
    display:flex; justify-content:space-between; align-items:center; gap:12px; }
  #stars{ background:rgba(255,255,255,.85); border-radius:999px; padding:8px 18px;
    font-size:clamp(20px,5vw,30px); font-weight:800; display:flex; align-items:center; gap:6px;
    box-shadow:0 4px 0 rgba(0,0,0,.12); }
  #stars.pop{ animation:pop .5s ease; }
  #speaker{ background:rgba(255,255,255,.85); border:none; border-radius:999px;
    width:clamp(50px,12vw,60px); height:clamp(50px,12vw,60px); font-size:clamp(22px,6vw,30px);
    cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  #speaker:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }
  .tb-left{ display:flex; align-items:center; gap:10px; }
  .homeBtn{ background:rgba(255,255,255,.85); border-radius:999px;
    width:clamp(46px,11vw,58px); height:clamp(46px,11vw,58px);
    display:flex; align-items:center; justify-content:center; font-size:clamp(22px,5.5vw,28px);
    text-decoration:none; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .homeBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }

  /* ---- Prompt area ---- */
  #prompt{
    text-align:center; padding:clamp(8px,2vh,16px) 16px clamp(6px,1.5vh,12px);
  }
  #prompt .label{ font-size:clamp(16px,4.5vw,24px); font-weight:800; color:#5a5a78; }
  #prompt .emoji{ font-size:clamp(64px,20vw,120px); line-height:1;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.15)); display:block; margin:clamp(4px,1vh,10px) 0; }
  #prompt .word{ font-size:clamp(28px,7.5vw,44px); font-weight:900; color:var(--ink);
    text-shadow:0 2px 0 rgba(255,255,255,.4); }

  /* ---- Choices ---- */
  #choices{
    flex:1; display:grid; grid-template-columns:repeat(2,1fr);
    gap:clamp(10px,2.5vw,18px); padding:clamp(8px,2vh,16px) clamp(16px,5vw,28px);
    width:100%; max-width:440px; min-height:0; align-content:center;
  }
  .choice{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(2px,0.8vh,8px);
    border:none; border-radius:24px; background:var(--card);
    cursor:pointer; padding:clamp(10px,2.5vh,20px) 8px;
    box-shadow:0 6px 0 rgba(0,0,0,.16); transition:transform .1s, box-shadow .1s, background .2s;
  }
  .choice:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .choice .em{ font-size:clamp(40px,12vw,70px); line-height:1;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.12)); }
  .choice .lbl{ font-size:clamp(14px,3.8vw,22px); font-weight:800; color:var(--ink); }

  .choice.correct{ background:#c9f7e5; box-shadow:0 0 0 4px var(--good), 0 6px 0 rgba(0,0,0,.1);
    animation:matchPop .45s ease; }
  .choice.wrong{ background:#ffe0e0; animation:nope .4s ease; }

  @keyframes nope{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  @keyframes matchPop{ 0%{transform:scale(1)} 45%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(0)} 60%{transform:translate(-50%,-50%) scale(1.15)} 100%{transform:translate(-50%,-50%) scale(1)} }

  /* ---- Confetti + toast ---- */
  .confetti{ position:fixed; top:-20px; width:14px; height:14px; z-index:50; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105dvh) rotate(720deg); } }
  #toast{ position:fixed; top:38%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(32px,9vw,58px); font-weight:900; color:#fff; z-index:60;
    text-shadow:0 4px 0 rgba(0,0,0,.2); pointer-events:none; text-align:center; }
  #toast.show{ animation:pop .8s ease; }

  /* ---- Start screen ---- */
  #start{ position:fixed; inset:0; z-index:100;
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; text-align:center; padding:20px; }
  #start .big{ font-size:clamp(70px,22vw,130px); animation:bob 2.2s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  #start h1{ font-size:clamp(30px,8vw,52px); color:#3a3a5a; text-shadow:0 3px 0 rgba(255,255,255,.4); }
  #start p{ color:#4a4a68; font-size:clamp(15px,4vw,20px); opacity:.95; max-width:24ch; }
  #play{ background:var(--good); color:#fff; border:none; border-radius:999px;
    font-size:clamp(26px,7vw,38px); font-weight:800; padding:16px 50px; cursor:pointer; box-shadow:0 8px 0 rgba(0,0,0,.2); }
  #play:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.2); }

  /* ---- Landscape ---- */
  @media (orientation:landscape) and (max-height:500px){
    #topbar{ padding:4px 14px; }
    #stars{ padding:4px 12px; font-size:clamp(15px,3.5vw,22px); }
    #speaker{ width:38px; height:38px; font-size:18px; }
    .homeBtn{ width:38px; height:38px; font-size:18px; }
    #prompt{ padding:2px 12px 2px; display:flex; align-items:center; gap:clamp(8px,2vw,16px); }
    #prompt .emoji{ font-size:clamp(40px,14vh,70px); margin:0; }
    #prompt .word{ font-size:clamp(20px,6vh,32px); }
    #prompt .label{ font-size:clamp(12px,3vh,16px); }
    #choices{ max-width:600px; padding:4px 16px 6px; }
    .choice{ padding:clamp(4px,1.5vh,12px) 6px; }
    .choice .em{ font-size:clamp(28px,9vh,50px); }
    .choice .lbl{ font-size:clamp(11px,3vh,16px); }
  }
</style>
</head>
<body>
  <div id="topbar">
    <div class="tb-left">
      <a class="homeBtn" href="index.html" title="Home" aria-label="Home">🏠</a>
      <div id="stars">⭐ <span id="starCount">0</span></div>
    </div>
    <button id="speaker" title="Say it again">🔊</button>
  </div>

  <div id="prompt">
    <span class="label">What is the opposite of...</span>
    <span class="emoji" id="qEmoji"></span>
    <span class="word" id="qWord"></span>
  </div>

  <div id="choices"></div>

  <div id="toast"></div>

  <div id="start">
    <div class="big">🔄</div>
    <h1>Pick the Opposite!</h1>
    <p>Find the opposite of each word.</p>
    <button id="play">▶ Play</button>
  </div>

<script>
(function(){
  const PAIRS = [
    // Emotions & feelings
    ["😊","Happy","😢","Sad"],
    ["😂","Laughing","😭","Crying"],
    ["😡","Angry","😌","Calm"],
    ["😨","Scared","💪","Brave"],
    ["😴","Sleepy","⚡","Awake"],
    ["🥰","Love","💔","Heartbreak"],
    ["😎","Cool","🤓","Nerdy"],
    ["🤗","Friendly","😤","Grumpy"],
    ["😮","Surprised","😐","Bored"],
    ["🥳","Excited","😞","Disappointed"],

    // Temperature & weather
    ["🔥","Hot","❄️","Cold"],
    ["☀️","Sunny","🌧️","Rainy"],
    ["🌞","Day","🌙","Night"],
    ["⛅","Cloudy","🌤️","Clear"],
    ["🌬️","Windy","🍃","Still"],
    ["🏜️","Dry","💧","Wet"],
    ["🌊","Flood","🏜️","Drought"],
    ["⛄","Winter","🌺","Spring"],
    ["🥶","Freezing","🥵","Boiling"],

    // Size & amount
    ["🐘","Big","🐜","Small"],
    ["🦒","Tall","🐁","Short"],
    ["🐋","Heavy","🪶","Light"],
    ["🏔️","Mountain","🕳️","Valley"],
    ["🌍","Huge","🔬","Tiny"],
    ["📏","Long","✂️","Short"],
    ["🎈","Inflate","📌","Deflate"],
    ["💰","Rich","🪹","Poor"],
    ["👨‍👩‍👧‍👦","Many","1️⃣","One"],
    ["🫙","Full","🥛","Empty"],

    // Direction & position
    ["⬆️","Up","⬇️","Down"],
    ["⬅️","Left","➡️","Right"],
    ["🔼","Top","🔽","Bottom"],
    ["📥","In","📤","Out"],
    ["🏠","Inside","🏕️","Outside"],
    ["⏩","Forward","⏪","Backward"],
    ["🧲","Pull","🤚","Push"],
    ["🔛","On","🔴","Off"],
    ["🌅","East","🌇","West"],
    ["🧭","North","🗺️","South"],

    // Speed & time
    ["🐆","Fast","🐌","Slow"],
    ["🚀","Quick","🐢","Sluggish"],
    ["⏰","Early","🦉","Late"],
    ["👶","Young","👴","Old"],
    ["🆕","New","📜","Old"],
    ["⏳","Before","⏰","After"],
    ["🏃","Running","🧘","Sitting"],
    ["💨","Rush","🧘‍♀️","Relax"],

    // Actions & states
    ["🚪","Open","🔒","Closed"],
    ["💡","On","🌑","Off"],
    ["🔊","Loud","🔇","Quiet"],
    ["🎤","Talking","🤫","Silent"],
    ["📢","Shout","🤫","Whisper"],
    ["✅","Yes","❌","No"],
    ["👍","Good","👎","Bad"],
    ["🏆","Win","😞","Lose"],
    ["📖","Read","📝","Write"],
    ["🎁","Give","🤲","Take"],
    ["🔓","Unlock","🔐","Lock"],
    ["🛫","Depart","🛬","Arrive"],
    ["🚶","Walk","🏃","Run"],
    ["💤","Sleep","👀","Wake"],
    ["🍽️","Eat","🤢","Fast"],
    ["😃","Smile","☹️","Frown"],
    ["👋","Hello","🚶‍♂️","Goodbye"],
    ["🎬","Start","🏁","Finish"],
    ["🔨","Build","💥","Break"],
    ["🌱","Grow","🍂","Shrink"],
    ["📈","Rise","📉","Fall"],
    ["🧹","Clean","🗑️","Dirty"],
    ["💧","Wet","🏜️","Dry"],
    ["🧊","Freeze","🫠","Melt"],
    ["🎈","Float","⚓","Sink"],
    ["🪄","Appear","💨","Vanish"],
    ["🤝","Together","💔","Apart"],

    // Nature & animals
    ["🌳","Tree","🌵","Cactus"],
    ["🦁","Lion","🐑","Sheep"],
    ["🐺","Wolf","🐰","Rabbit"],
    ["🦅","Fly","🐟","Swim"],
    ["🌻","Flower","🍁","Leaf"],
    ["🐉","Dragon","🧚","Fairy"],
    ["🦈","Shark","🐬","Dolphin"],
    ["🐻","Bear","🐝","Bee"],
    ["🌊","Sea","🏔️","Land"],

    // Light & dark
    ["⚪","White","⚫","Black"],
    ["🌕","Bright","🌑","Dark"],
    ["🕯️","Light","🌫️","Shadow"],
    ["🌈","Colorful","⬜","Plain"],
    ["✨","Shiny","🪨","Dull"],

    // Texture & shape
    ["🧸","Soft","🪨","Hard"],
    ["🧈","Smooth","🌵","Rough"],
    ["🍦","Sweet","🍋","Sour"],
    ["🍬","Candy","🥦","Veggie"],
    ["🧂","Salty","🍯","Sweet"],
    ["🎂","Dessert","🥗","Salad"],
    ["🍕","Junk food","🥕","Healthy"],

    // Places & objects
    ["🏙️","City","🌾","Farm"],
    ["🏖️","Beach","🏔️","Mountain"],
    ["🏫","School","🏠","Home"],
    ["🚗","Drive","🚶","Walk"],
    ["🛒","Buy","💸","Sell"],
    ["📱","Modern","📺","Retro"],

    // Concepts
    ["✅","True","❌","False"],
    ["🟢","Go","🔴","Stop"],
    ["🔑","Answer","❓","Question"],
    ["😇","Kind","😈","Mean"],
    ["🦸","Hero","🦹","Villain"],
    ["👑","King","🤴","Prince"],
    ["🧠","Smart","🤪","Silly"],
    ["💎","Precious","🗑️","Worthless"],
    ["🎯","Hit","💨","Miss"],
    ["🏅","First","🔚","Last"],
    ["⭐","Best","👎","Worst"],
    ["🤑","Expensive","🏷️","Cheap"],
    ["🎁","Wrapped","📦","Unwrapped"],
    ["🧩","Whole","💔","Broken"],
    ["🔔","Noisy","🔕","Mute"],
  ];

  const $ = id => document.getElementById(id);
  const choicesEl = $("choices"), starCountEl = $("starCount"), toast = $("toast");
  const qEmoji = $("qEmoji"), qWord = $("qWord");

  let stars = 0, locked = false, lastSpeech = "";
  let usedIndices = new Set();

  const rnd = n => Math.floor(Math.random()*n);
  const pick = arr => arr[rnd(arr.length)];
  const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; };

  // ---------- Audio ----------
  let actx = null, masterGain = null;
  function ensureAudio(){
    if(!actx){
      try{
        actx = new (window.AudioContext||window.webkitAudioContext)();
        masterGain = actx.createGain(); masterGain.gain.value = 0.85;
        const comp = actx.createDynamicsCompressor();
        masterGain.connect(comp); comp.connect(actx.destination);
      }catch(e){}
    }
    if(actx && actx.state === "suspended") actx.resume();
  }
  function tone(freq, start, dur, type, peak){
    if(!actx) return;
    const t0 = actx.currentTime + start;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine"; o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak || 0.22, t0 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t0); o.stop(t0 + dur + 0.03);
  }
  const playCorrect = () => { ensureAudio(); [523.25,659.25,783.99].forEach((f,i)=>tone(f, i*0.11, 0.34, "sine", 0.3)); };
  const playWrong   = () => { ensureAudio(); tone(392,0,0.18,"sine",0.2); tone(311,0.13,0.26,"sine",0.2); };

  // ---------- Speech ----------
  let voice = null;
  function chooseVoice(){
    if(!("speechSynthesis" in window)) return;
    const vs = speechSynthesis.getVoices(); if(!vs.length) return;
    const prefer = ["Google US English","Samantha",
      "Microsoft Aria Online (Natural) - English (United States)","Microsoft Aria",
      "Microsoft Jenny Online (Natural) - English (United States)","Microsoft Zira","Karen","Moira","Alex"];
    voice = prefer.map(n => vs.find(v => v.name === n)).find(Boolean)
         || vs.find(v => /en[-_]US/i.test(v.lang) && /google|aria|jenny|zira|samantha|female/i.test(v.name))
         || vs.find(v => /en[-_]US/i.test(v.lang)) || vs.find(v => /^en/i.test(v.lang)) || vs[0];
  }
  if("speechSynthesis" in window){ chooseVoice(); speechSynthesis.onvoiceschanged = chooseVoice; }
  let speakToken = 0;
  function speak(text){
    lastSpeech = text;
    if(!("speechSynthesis" in window)) return;
    const my = ++speakToken;
    try{ speechSynthesis.cancel(); }catch(e){}
    setTimeout(() => {
      if(my !== speakToken) return;
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if(voice) u.voice = voice;
        u.rate = 0.92; u.pitch = 1.05; u.volume = 1; u.lang = (voice && voice.lang) || "en-US";
        speechSynthesis.speak(u);
      }catch(e){}
    }, 45);
  }
  $("speaker").addEventListener("click", () => { ensureAudio(); if(lastSpeech) speak(lastSpeech); });

  // ---------- Pick a pair, avoiding repeats ----------
  function pickPairIndex(){
    if(usedIndices.size >= PAIRS.length) usedIndices.clear();
    let idx;
    do { idx = rnd(PAIRS.length); } while(usedIndices.has(idx));
    usedIndices.add(idx);
    return idx;
  }

  // ---------- Build a round ----------
  function newRound(){
    locked = false;
    choicesEl.innerHTML = "";

    const idx = pickPairIndex();
    const pair = PAIRS[idx];

    const flip = rnd(2);
    const showEmoji = flip ? pair[2] : pair[0];
    const showWord  = flip ? pair[3] : pair[1];
    const ansEmoji  = flip ? pair[0] : pair[2];
    const ansWord   = flip ? pair[1] : pair[3];

    qEmoji.textContent = showEmoji;
    qWord.textContent = showWord;

    const distractors = new Set();
    while(distractors.size < 3){
      const di = rnd(PAIRS.length);
      if(di === idx) continue;
      const dp = PAIRS[di];
      const dSide = rnd(2);
      const de = dSide ? dp[2] : dp[0];
      const dw = dSide ? dp[3] : dp[1];
      if(de === ansEmoji) continue;
      distractors.add(JSON.stringify([de, dw]));
    }

    const options = [[ansEmoji, ansWord, true]];
    for(const d of distractors){
      const [e, w] = JSON.parse(d);
      options.push([e, w, false]);
    }
    shuffle(options);

    options.forEach(([e, w, isCorrect]) => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerHTML = `<span class="em">${e}</span><span class="lbl">${w}</span>`;
      btn.addEventListener("click", () => tapChoice(btn, isCorrect, showWord, ansWord));
      choicesEl.appendChild(btn);
    });

    speak("What is the opposite of " + showWord + "?");
  }

  // ---------- Tap choice ----------
  function tapChoice(btn, isCorrect, qw, aw){
    if(locked) return;
    ensureAudio();

    if(isCorrect){
      locked = true;
      btn.classList.add("correct");
      playCorrect(); burst(15);
      addStar();
      speak("Yes! The opposite of " + qw + " is " + aw + "!");
      setTimeout(newRound, 1600);
    } else {
      playWrong();
      btn.classList.add("wrong");
      speak("Try again!");
      setTimeout(() => btn.classList.remove("wrong"), 450);
    }
  }

  // ---------- Rewards ----------
  function addStar(){
    stars++; starCountEl.textContent = stars;
    const s = $("stars"); s.classList.remove("pop"); void s.offsetWidth; s.classList.add("pop");
  }
  const CONF = ["#ff6b6b","#ffd93d","#4dabf7","#51cf66","#ff8fab","#9775fa"];
  function burst(n){
    for(let i=0;i<n;i++){
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = rnd(100)+"vw";
      c.style.background = pick(CONF);
      c.style.borderRadius = rnd(2) ? "50%" : "2px";
      c.style.animationDuration = (1.1 + Math.random()*1.1)+"s";
      c.style.animationDelay = (Math.random()*0.25)+"s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }

  // ---------- Start ----------
  $("play").addEventListener("click", () => {
    ensureAudio();
    $("start").style.display = "none";
    newRound();
  });
})();
</script>
</body>
</html>
