<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Match the Shadow 🌓</title>
<style>
  :root{
    --bg1:#d9e4ff; --bg2:#efe3ff; --bg3:#dff6ff;
    --card:#ffffff; --ink:#33324a; --good:#2fbf87; --sel:#ffd23f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  body{
    font-family:"Comic Sans MS","Baloo 2",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    overflow:hidden; user-select:none; touch-action:manipulation;
    display:flex; flex-direction:column; align-items:center;
    height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button{ touch-action:manipulation; font-family:inherit; }

  /* ---- Top bar ---- */
  #topbar{ width:100%; max-width:640px; padding:12px 20px;
    display:flex; justify-content:space-between; align-items:center; gap:12px; }
  #stars{ background:rgba(255,255,255,.85); border-radius:999px; padding:8px 18px;
    font-size:clamp(20px,5vw,30px); font-weight:800; display:flex; align-items:center; gap:6px;
    box-shadow:0 4px 0 rgba(0,0,0,.12); }
  #stars.pop{ animation:pop .5s ease; }
  #speaker{ background:rgba(255,255,255,.85); border:none; border-radius:999px;
    width:clamp(50px,12vw,60px); height:clamp(50px,12vw,60px); font-size:clamp(22px,6vw,30px);
    cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  #speaker:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }
  .tb-left{ display:flex; align-items:center; gap:10px; }
  .homeBtn{ background:rgba(255,255,255,.85); border-radius:999px;
    width:clamp(46px,11vw,58px); height:clamp(46px,11vw,58px);
    display:flex; align-items:center; justify-content:center; font-size:clamp(22px,5.5vw,28px);
    text-decoration:none; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .homeBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }

  /* ---- Hint ---- */
  #hint{ color:#3a3a5a; font-weight:800; text-align:center; padding:0 16px 6px;
    font-size:clamp(15px,4.2vw,22px); text-shadow:0 1px 0 rgba(255,255,255,.4); }

  /* ---- Board ---- */
  #stage{ flex:1; width:100%; max-width:600px; display:flex; flex-direction:column;
    justify-content:flex-start; padding:clamp(4px,1.5vh,12px) 16px 16px; min-height:0; }
  #board{ display:flex; gap:clamp(16px,6vw,60px); width:100%; justify-content:center; flex:1; min-height:0; }
  .column{ display:flex; flex-direction:column; gap:clamp(4px,1vh,10px); flex:1 1 0; max-width:200px; }
  .cards{ display:flex; flex-direction:column; gap:clamp(6px,1.2vh,12px); flex:1; min-height:0; justify-content:space-evenly; }
  .colhead{ text-align:center; font-weight:800; font-size:clamp(13px,3.4vw,17px); color:#5a5a78; padding-bottom:2px; }
  .card{
    height:clamp(48px,11vh,88px); border-radius:20px; border:none; cursor:pointer; background:var(--card);
    display:flex; align-items:center; justify-content:center; position:relative;
    box-shadow:0 6px 0 rgba(0,0,0,.16); transition:transform .1s, box-shadow .1s;
  }
  .card:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.16); }
  .obj-card{ font-size:clamp(38px,12vw,68px); line-height:1; }
  .shadow-card .em{ font-size:clamp(38px,12vw,68px); line-height:1; filter:brightness(0); transition:filter .35s; }

  .card.selected{ transform:translateY(-4px) scale(1.05);
    box-shadow:0 0 0 5px var(--sel), 0 10px 0 rgba(0,0,0,.16); z-index:2; }
  .card.matched{ background:#c9f7e5; cursor:default;
    box-shadow:0 0 0 4px var(--good), 0 6px 0 rgba(0,0,0,.1); animation:matchPop .45s ease; }
  .card.matched .em{ filter:brightness(1); }           /* reveal the shadow's colour on a match (brightness(1)=full colour; transitions cleanly, unlike `none`) */
  .card.matched::after{ content:"✓"; position:absolute; top:-8px; right:-8px;
    width:clamp(20px,5.5vw,28px); height:clamp(20px,5.5vw,28px); border-radius:50%;
    background:#fff; color:var(--good); font-size:clamp(12px,3.2vw,17px); font-weight:900;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,.25); }
  .card.bad{ animation:nope .4s ease; }
  @keyframes nope{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  @keyframes matchPop{ 0%{transform:scale(1)} 45%{transform:scale(1.12)} 100%{transform:scale(1)} }
  @keyframes pop{ 0%{transform:scale(0)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }

  /* ---- Confetti + toast ---- */
  .confetti{ position:fixed; top:-20px; width:14px; height:14px; z-index:50; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105dvh) rotate(720deg); } }
  #toast{ position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:clamp(32px,9vw,58px); font-weight:900; color:#fff; z-index:60;
    text-shadow:0 4px 0 rgba(0,0,0,.2); pointer-events:none; text-align:center; }
  #toast.show{ animation:pop .8s ease; }

  /* ---- Start screen ---- */
  #start{ position:fixed; inset:0; z-index:100;
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; text-align:center; padding:20px; }
  #start .big{ font-size:clamp(70px,22vw,130px); animation:bob 2.2s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  #start h1{ font-size:clamp(30px,8vw,52px); color:#3a3a5a; text-shadow:0 3px 0 rgba(255,255,255,.4); }
  #start p{ color:#4a4a68; font-size:clamp(15px,4vw,20px); opacity:.95; max-width:24ch; }
  #play{ background:var(--good); color:#fff; border:none; border-radius:999px;
    font-size:clamp(26px,7vw,38px); font-weight:800; padding:16px 50px; cursor:pointer; box-shadow:0 8px 0 rgba(0,0,0,.2); }
  #play:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.2); }

  /* ---- Landscape phones ---- */
  @media (orientation:landscape) and (max-height:500px){
    #topbar{ padding:4px 14px; }
    #hint{ font-size:clamp(13px,3.4vw,18px); padding:0 12px 2px; }
    #stars{ padding:4px 12px; font-size:clamp(15px,3.5vw,22px); }
    #speaker{ width:38px; height:38px; font-size:18px; }
    .homeBtn{ width:38px; height:38px; font-size:18px; }
    #stage{ padding:0 12px 5px; }
    .colhead{ display:none; }
    .card{ height:clamp(34px,14vh,60px); }
    .obj-card{ font-size:clamp(22px,10vh,44px); } .shadow-card .em{ font-size:clamp(22px,10vh,44px); }
  }
</style>
</head>
<body>
  <div id="topbar">
    <div class="tb-left">
      <a class="homeBtn" href="index.html" title="Home" aria-label="Home">🏠</a>
      <div id="stars">⭐ <span id="starCount">0</span></div>
    </div>
    <button id="speaker" title="Say it again">🔊</button>
  </div>
  <div id="hint">Tap a picture, then its shadow!</div>

  <div id="stage">
    <div id="board">
      <div class="column"><div class="colhead">Picture</div><div id="objects" class="cards"></div></div>
      <div class="column"><div class="colhead">Shadow</div><div id="shadows" class="cards"></div></div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="start">
    <div class="big">🌓</div>
    <h1>Match the Shadow!</h1>
    <p>Match each picture with its matching shadow.</p>
    <button id="play">▶ Play</button>
  </div>

<script>
(function(){
  // Objects with distinctive outlines (so their black silhouettes are easy to tell apart) + names for speech.
  const POOL = [
    {e:"🦋",w:"Butterfly"},{e:"🐘",w:"Elephant"},{e:"🦒",w:"Giraffe"},{e:"🐢",w:"Turtle"},
    {e:"🐰",w:"Rabbit"},{e:"🐱",w:"Cat"},{e:"🐶",w:"Dog"},{e:"🦆",w:"Duck"},{e:"🐠",w:"Fish"},
    {e:"🐙",w:"Octopus"},{e:"🦄",w:"Unicorn"},{e:"🌳",w:"Tree"},{e:"☂️",w:"Umbrella"},{e:"🎸",w:"Guitar"},
    {e:"🔑",w:"Key"},{e:"✈️",w:"Airplane"},{e:"🚗",w:"Car"},{e:"🚲",w:"Bicycle"},{e:"🚀",w:"Rocket"},
    {e:"⭐",w:"Star"},{e:"🌙",w:"Moon"},{e:"🍌",w:"Banana"},{e:"🍇",w:"Grapes"},{e:"🥕",w:"Carrot"},
    {e:"🐝",w:"Bee"},{e:"🐌",w:"Snail"},{e:"🦀",w:"Crab"},{e:"🐧",w:"Penguin"},{e:"🦉",w:"Owl"},
    {e:"🌻",w:"Sunflower"},{e:"⚓",w:"Anchor"},{e:"🎈",w:"Balloon"},{e:"🧦",w:"Sock"},{e:"👟",w:"Shoe"},
    {e:"🎩",w:"Hat"},{e:"🍦",w:"Ice cream"},{e:"🎁",w:"Gift"},{e:"🐴",w:"Horse"},{e:"🍄",w:"Mushroom"},
    {e:"🪁",w:"Kite"},{e:"🦈",w:"Shark"},{e:"🐬",w:"Dolphin"},{e:"🐸",w:"Frog"},{e:"🌵",w:"Cactus"},
    {e:"🔔",w:"Bell"},{e:"✂️",w:"Scissors"}
  ];
  const PAIRS = 5;

  const $ = id => document.getElementById(id);
  const objCol = $("objects"), shCol = $("shadows"), starCountEl = $("starCount"), toast = $("toast");

  let stars = 0, selected = null, matchedCount = 0, locked = false, lastSpeech = "", wordOf = {};

  const rnd = n => Math.floor(Math.random()*n);
  const pick = arr => arr[rnd(arr.length)];
  const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; };

  // ---------- Audio: soft, click-free SFX through a compressor ----------
  let actx = null, masterGain = null;
  function ensureAudio(){
    if(!actx){
      try{
        actx = new (window.AudioContext||window.webkitAudioContext)();
        masterGain = actx.createGain(); masterGain.gain.value = 0.85;
        const comp = actx.createDynamicsCompressor();
        masterGain.connect(comp); comp.connect(actx.destination);
      }catch(e){}
    }
    if(actx && actx.state === "suspended") actx.resume();
  }
  function tone(freq, start, dur, type, peak){
    if(!actx) return;
    const t0 = actx.currentTime + start;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine"; o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak || 0.22, t0 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(masterGain);
    o.start(t0); o.stop(t0 + dur + 0.03);
  }
  const playCorrect = () => { ensureAudio(); [523.25,659.25,783.99].forEach((f,i)=>tone(f, i*0.11, 0.34, "sine", 0.3)); };
  const playWrong   = () => { ensureAudio(); tone(392,0,0.18,"sine",0.2); tone(311,0.13,0.26,"sine",0.2); };
  const playWin     = () => { ensureAudio(); [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f, i*0.12, 0.4, "sine", 0.28)); };
  const playBlip    = () => { ensureAudio(); tone(620, 0, 0.08, "sine", 0.12); };

  // ---------- Speech: clear voice, cancel-safe ----------
  let voice = null;
  function chooseVoice(){
    if(!("speechSynthesis" in window)) return;
    const vs = speechSynthesis.getVoices(); if(!vs.length) return;
    const prefer = ["Google US English","Samantha",
      "Microsoft Aria Online (Natural) - English (United States)","Microsoft Aria",
      "Microsoft Jenny Online (Natural) - English (United States)","Microsoft Zira","Karen","Moira","Alex"];
    voice = prefer.map(n => vs.find(v => v.name === n)).find(Boolean)
         || vs.find(v => /en[-_]US/i.test(v.lang) && /google|aria|jenny|zira|samantha|female/i.test(v.name))
         || vs.find(v => /en[-_]US/i.test(v.lang)) || vs.find(v => /^en/i.test(v.lang)) || vs[0];
  }
  if("speechSynthesis" in window){ chooseVoice(); speechSynthesis.onvoiceschanged = chooseVoice; }
  let speakToken = 0;
  function speak(text){
    lastSpeech = text;
    if(!("speechSynthesis" in window)) return;
    const my = ++speakToken;
    try{ speechSynthesis.cancel(); }catch(e){}
    setTimeout(() => {
      if(my !== speakToken) return;
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if(voice) u.voice = voice;
        u.rate = 0.92; u.pitch = 1.05; u.volume = 1; u.lang = (voice && voice.lang) || "en-US";
        speechSynthesis.speak(u);
      }catch(e){}
    }, 45);
  }
  $("speaker").addEventListener("click", () => { ensureAudio(); if(lastSpeech) speak(lastSpeech); });

  // ---------- Build a board ----------
  function newPuzzle(){
    locked = false; selected = null; matchedCount = 0;
    objCol.innerHTML = ""; shCol.innerHTML = "";
    const chosen = shuffle([...POOL]).slice(0, PAIRS);
    wordOf = {}; chosen.forEach(o => wordOf[o.e] = o.w);
    const objOrder = shuffle([...chosen]);
    const shadowOrder = shuffle([...chosen]);

    objOrder.forEach(o => {
      const b = document.createElement("button");
      b.className = "card obj-card"; b.textContent = o.e;
      b.dataset.type = "obj"; b.dataset.e = o.e;
      b.setAttribute("aria-label", o.w);
      b.addEventListener("click", () => tapCard(b));
      objCol.appendChild(b);
    });
    shadowOrder.forEach(o => {
      const b = document.createElement("button");
      b.className = "card shadow-card";
      b.dataset.type = "shadow"; b.dataset.e = o.e;
      b.setAttribute("aria-label", "shadow");
      const em = document.createElement("span"); em.className = "em"; em.textContent = o.e;   // rendered black
      b.appendChild(em);
      b.addEventListener("click", () => tapCard(b));
      shCol.appendChild(b);
    });
    speak("Match each picture to its shadow.");
  }

  // ---------- Interaction ----------
  function clearSelection(){ if(selected){ selected.classList.remove("selected"); selected = null; } }
  function select(card){ selected = card; card.classList.add("selected"); }

  function tapCard(card){
    if(locked || card.classList.contains("matched")) return;
    ensureAudio();
    if(card.dataset.type === "obj") speak(wordOf[card.dataset.e] || "");
    else playBlip();

    if(!selected){ select(card); return; }
    if(selected === card){ clearSelection(); return; }
    if(selected.dataset.type === card.dataset.type){ clearSelection(); select(card); return; }

    // one object + one shadow → check the match (same emoji)
    const a = selected, b = card;
    if(a.dataset.e === b.dataset.e) matchPair(a, b);
    else wrongPair(a, b);
  }

  function matchPair(a, b){
    clearSelection();
    a.classList.add("matched"); b.classList.add("matched");
    playCorrect();
    speak((wordOf[a.dataset.e] || "Match") + "!");
    addStar(); burst(10);
    matchedCount++;
    if(matchedCount === PAIRS) win();
  }
  function wrongPair(a, b){
    playWrong(); speak("Try again.");
    [a, b].forEach(c => { c.classList.add("bad"); setTimeout(() => c.classList.remove("bad"), 450); });
    clearSelection();
  }
  function win(){
    locked = true;
    playWin(); burst(60);
    showToast("🎉 You did it!");
    speak("Hooray! You matched them all!");
    setTimeout(newPuzzle, 2100);
  }

  // ---------- Rewards ----------
  function addStar(){
    stars++; starCountEl.textContent = stars;
    const s = $("stars"); s.classList.remove("pop"); void s.offsetWidth; s.classList.add("pop");
  }
  function showToast(txt){
    toast.textContent = txt;
    toast.classList.remove("show"); void toast.offsetWidth; toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => { toast.textContent = ""; }, 1900);
  }
  const CONF = ["#ff6b6b","#ffd93d","#4dabf7","#51cf66","#ff8fab","#9775fa"];
  function burst(n){
    for(let i=0;i<n;i++){
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = rnd(100)+"vw";
      c.style.background = pick(CONF);
      c.style.borderRadius = rnd(2) ? "50%" : "2px";
      c.style.animationDuration = (1.1 + Math.random()*1.1)+"s";
      c.style.animationDelay = (Math.random()*0.25)+"s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }

  // ---------- Start ----------
  $("play").addEventListener("click", () => {
    ensureAudio();
    if("speechSynthesis" in window){ try{ speechSynthesis.getVoices(); }catch(e){} }
    $("start").style.display = "none";
    setTimeout(newPuzzle, 250);
  });

  // testing hook (harmless in normal play)
  window.__shpair = {
    get state(){ return { matched: matchedCount, pairs: PAIRS, stars, locked }; },
    objs: () => [...objCol.querySelectorAll(".card")].map(c => c.dataset.e),
    shadows: () => [...shCol.querySelectorAll(".card")].map(c => c.dataset.e),
    tapObj: (e) => { const b = [...objCol.querySelectorAll(".card")].find(x => x.dataset.e === e); if(b) b.click(); },
    tapShadow: (e) => { const b = [...shCol.querySelectorAll(".card")].find(x => x.dataset.e === e); if(b) b.click(); },
    newPuzzle
  };
})();
</script>
</body>
</html>
